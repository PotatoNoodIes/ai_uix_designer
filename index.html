<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIX AI Agent | Your intelligent UI &amp; UX design assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "sans-serif"],
              display: ["Outfit", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              brand: {
                50:  "#eef2ff",
                100: "#e0e7ff",
                200: "#c7d2fe",
                400: "#818cf8",
                500: "#6366f1",
                600: "#3B5BDB",
                700: "#2f4ac7",
                800: "#1e38a8",
                900: "#142a8a",
              },
              amber: {
                400: "#fbbf24",
                500: "#f59e0b",
                600: "#F97316",
              },
            },
          },
        },
      };
    </script>

    <!-- Google Fonts: Outfit (display) + DM Sans (body) + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- React Flow Styles -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reactflow@11.10.1/dist/style.css"
    />

    <style>
      /* ─── Design Tokens ────────────────────────────────────────── */
      :root {
        /* Brand */
        --brand:       #3B5BDB;
        --brand-dim:   rgba(59,91,219,0.12);
        --brand-glow:  rgba(59,91,219,0.25);
        --accent:      #F97316;
        --accent-dim:  rgba(249,115,22,0.12);
        --accent-glow: rgba(249,115,22,0.30);

        /* Canvas */
        --canvas-bg:   #0A0D14;
        --dot-color:   #1a2033;

        /* Sidebar / Panels */
        --sidebar-bg:    #0E1117;
        --sidebar-border: rgba(255,255,255,0.07);
        --panel-bg:      #131722;
        --panel-border:  rgba(255,255,255,0.08);

        /* Surface cards */
        --card-bg:     #181d2a;
        --card-border: rgba(255,255,255,0.06);

        /* Text */
        --text-primary:   #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted:     #475569;

        /* Shadows */
        --shadow-sm:  0 1px 2px rgba(0,0,0,0.4);
        --shadow-md:  0 4px 16px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.3);
        --shadow-lg:  0 12px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
        --shadow-brand: 0 4px 20px rgba(59,91,219,0.35);
        --shadow-accent: 0 4px 20px rgba(249,115,22,0.4);

        /* Radius scale */
        --r-sm:   6px;
        --r-md:   12px;
        --r-lg:   20px;
        --r-xl:   28px;
        --r-2xl:  40px;

        /* Light-mode overrides applied when .light class added */
      }

      .light {
        --sidebar-bg:    #ffffff;
        --sidebar-border: rgba(0,0,0,0.08);
        --panel-bg:      #f8fafc;
        --panel-border:  rgba(0,0,0,0.07);
        --card-bg:       #f1f5f9;
        --card-border:   rgba(0,0,0,0.07);
        --text-primary:   #0f172a;
        --text-secondary: #475569;
        --text-muted:     #94a3b8;
        --shadow-sm:  0 1px 2px rgba(0,0,0,0.06);
        --shadow-md:  0 4px 16px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
        --shadow-lg:  0 12px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
        --dot-color: #e2e8f0;
        --canvas-bg: #f0f2f7;
      }

      /* ─── Base ─────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: "DM Sans", sans-serif;
        margin: 0;
        padding: 0;
        background: var(--canvas-bg);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Typography Helpers ────────────────────────────────────── */
      .font-display { font-family: "Outfit", sans-serif; }
      .font-mono    { font-family: "JetBrains Mono", monospace; }

      /* ─── Scrollbars ─────────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      .light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
      .chat-scroll::-webkit-scrollbar { width: 0; }

      /* ─── React Flow Overrides ───────────────────────────────────── */
      .react-flow__pane        { cursor: crosshair !important; }
      .react-flow__pane.dragging { cursor: grabbing !important; }
      .react-flow__handle      { display: none !important; }
      .react-flow__node        { border-radius: 0 !important; transition: filter 0.2s ease; }
      .react-flow__node.selected { border: none !important; }
      .react-flow__attribution  { display: none !important; }

      /* ─── Sidebar Shell ─────────────────────────────────────────── */
      .uix-sidebar {
        background: var(--sidebar-bg);
        border-right: 1px solid var(--sidebar-border);
      }

      /* ─── Wordmark ──────────────────────────────────────────────── */
      .uix-wordmark {
        font-family: "Outfit", sans-serif;
        font-weight: 800;
        font-size: 1.125rem;
        letter-spacing: -0.02em;
        color: var(--text-primary);
      }
      .uix-wordmark span {
        color: var(--brand);
      }

      /* ─── Icon Badge ─────────────────────────────────────────────── */
      .uix-icon-badge {
        width: 32px;
        height: 32px;
        border-radius: var(--r-sm);
        background: var(--brand);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-brand);
        flex-shrink: 0;
      }

      /* ─── Dividers ───────────────────────────────────────────────── */
      .uix-divider {
        background: var(--sidebar-border);
      }

      /* ─── Label / Micro ─────────────────────────────────────────── */
      .uix-label {
        font-family: "Outfit", sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .uix-micro {
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 400;
        color: var(--text-secondary);
      }

      /* ─── Icon Buttons (toolbar row) ─────────────────────────────── */
      .uix-icon-btn {
        width: 32px;
        height: 32px;
        border-radius: var(--r-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
        background: transparent;
      }
      .uix-icon-btn:hover {
        background: var(--brand-dim);
        border-color: var(--brand-glow);
        color: var(--brand);
      }

      /* ─── Primary CTA (send, generate) — Amber ──────────────────── */
      .uix-btn-send {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--r-md);
        box-shadow: var(--shadow-accent);
        cursor: pointer;
        transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      }
      .uix-btn-send:hover  { background: #ea6f0a; }
      .uix-btn-send:active { transform: scale(0.95); }
      .uix-btn-send:disabled {
        background: rgba(255,255,255,0.07);
        box-shadow: none;
        cursor: not-allowed;
        color: var(--text-muted);
      }

      /* ─── Secondary brand button (blue) ─────────────────────────── */
      .uix-btn-brand {
        background: var(--brand);
        color: #fff;
        border: none;
        border-radius: var(--r-sm);
        box-shadow: var(--shadow-brand);
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        font-family: "Outfit", sans-serif;
        font-weight: 700;
      }
      .uix-btn-brand:hover  { background: var(--brand-700, #2f4ac7); }
      .uix-btn-brand:active { transform: scale(0.96); }
      .uix-btn-brand:disabled { opacity: 0.4; cursor: not-allowed; }

      /* ─── Ghost button ───────────────────────────────────────────── */
      .uix-btn-ghost {
        background: transparent;
        border: 1px solid var(--panel-border);
        border-radius: var(--r-sm);
        color: var(--text-secondary);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        font-family: "Outfit", sans-serif;
        font-weight: 600;
      }
      .uix-btn-ghost:hover {
        background: var(--brand-dim);
        border-color: var(--brand-glow);
        color: var(--brand);
      }

      /* ─── Segment / Toggle ───────────────────────────────────────── */
      .uix-segment {
        display: flex;
        gap: 2px;
        padding: 3px;
        border-radius: var(--r-sm);
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--panel-border);
      }
      .light .uix-segment {
        background: rgba(0,0,0,0.04);
      }
      .uix-segment-btn {
        padding: 4px 14px;
        border-radius: 5px;
        font-family: "Outfit", sans-serif;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        background: transparent;
        border: none;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .uix-segment-btn.active {
        background: var(--brand);
        color: #fff;
        box-shadow: var(--shadow-brand);
      }

      /* ─── Chat bubbles ───────────────────────────────────────────── */
      .uix-bubble-user {
        background: var(--brand);
        border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg);
        color: #fff;
        box-shadow: var(--shadow-brand);
      }
      .uix-bubble-ai {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--r-lg) var(--r-lg) var(--r-lg) 4px;
        color: var(--text-primary);
        box-shadow: var(--shadow-sm);
      }

      /* ─── Textarea / Input ───────────────────────────────────────── */
      .uix-textarea {
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--panel-border);
        border-radius: var(--r-lg);
        color: var(--text-primary);
        font-family: "DM Sans", sans-serif;
        font-size: 13.5px;
        transition: border-color 0.15s, background 0.15s;
        resize: none;
        outline: none;
      }
      .uix-textarea::placeholder { color: var(--text-muted); }
      .uix-textarea:focus {
        border-color: var(--brand);
        background: rgba(59,91,219,0.06);
      }
      .light .uix-textarea {
        background: rgba(0,0,0,0.03);
        border-color: rgba(0,0,0,0.1);
        color: #0f172a;
      }
      .light .uix-textarea:focus {
        border-color: var(--brand);
        background: rgba(59,91,219,0.04);
      }

      /* ─── Screen Node Frame ──────────────────────────────────────── */
      .screen-frame-mobile  { border-radius: 40px; border-width: 4px; }
      .screen-frame-tablet  { border-radius: 24px; border-width: 3px; }
      .screen-frame-desktop { border-radius: 10px; border-width: 1px; }

      .screen-frame-selected-mobile  { box-shadow: 0 0 0 12px rgba(59,91,219,0.12), var(--shadow-lg); }
      .screen-frame-selected-tablet  { box-shadow: 0 0 0 10px rgba(59,91,219,0.12), var(--shadow-lg); }
      .screen-frame-selected-desktop { box-shadow: 0 0 0 6px rgba(59,91,219,0.15), var(--shadow-lg); }

      /* ─── Node header ────────────────────────────────────────────── */
      .uix-node-header {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        cursor: grab;
      }
      .uix-node-header:active { cursor: grabbing; }
      .uix-node-header:hover { border-color: rgba(59,91,219,0.3); }
      .light .uix-node-header { background: #fff; border-color: rgba(0,0,0,0.08); }

      /* ─── Node toolbar popup ─────────────────────────────────────── */
      .uix-node-toolbar {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-lg);
      }
      .light .uix-node-toolbar {
        background: #fff;
        border-color: rgba(0,0,0,0.08);
      }

      /* ─── Top nav ────────────────────────────────────────────────── */
      .uix-topnav {
        background: var(--sidebar-bg);
        border-bottom: 1px solid var(--sidebar-border);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .light .uix-topnav {
        background: rgba(255,255,255,0.92);
        border-bottom-color: rgba(0,0,0,0.07);
      }

      /* ─── Bottom canvas toolbar ──────────────────────────────────── */
      .uix-canvas-toolbar {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-lg);
      }
      .light .uix-canvas-toolbar {
        background: #fff;
        border-color: rgba(0,0,0,0.08);
      }
      .uix-canvas-toolbar-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        border: none;
        background: transparent;
      }
      .uix-canvas-toolbar-btn:hover {
        background: var(--brand-dim);
        color: var(--brand);
      }
      .uix-canvas-toolbar-btn:active { transform: scale(0.9); }
      .uix-canvas-toolbar-btn:disabled { opacity: 0.25; cursor: not-allowed; }

      /* ─── Modal base ─────────────────────────────────────────────── */
      .uix-modal {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--r-xl);
        box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 4px 16px rgba(0,0,0,0.4);
      }
      .light .uix-modal { background: #fff; border-color: rgba(0,0,0,0.08); }
      .modal-backdrop { backdrop-filter: blur(10px); background: rgba(0,0,0,0.65); }

      /* ─── Settings inputs (light/dark aware) ─────────────────────── */
      .settings-input,
      .settings-select {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--panel-border);
        border-radius: var(--r-sm);
        padding: 10px 12px;
        color: var(--text-primary);
        width: 100%;
        outline: none;
        font-size: 13px;
        font-family: "DM Sans", sans-serif;
        transition: border-color 0.15s;
      }
      .settings-input:focus,
      .settings-select:focus { border-color: var(--brand); }
      .light .settings-input,
      .light .settings-select {
        background: rgba(0,0,0,0.04);
        border-color: rgba(0,0,0,0.1);
        color: #0f172a;
      }
      .settings-select {
        appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 12px center;
        background-size: 14px;
      }

      /* ─── History project cards ──────────────────────────────────── */
      .uix-project-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--r-lg);
        transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
        text-align: left;
        cursor: pointer;
      }
      .uix-project-card:hover {
        border-color: var(--brand);
        transform: translateY(-2px);
        box-shadow: var(--shadow-brand);
      }
      .uix-project-card.active {
        border-color: var(--brand);
        background: var(--brand-dim);
      }
      .light .uix-project-card { background: #fff; border-color: rgba(0,0,0,0.07); }

      /* ─── Toast notifications ────────────────────────────────────── */
      .uix-toast {
        border-radius: var(--r-md);
        padding: 12px 18px;
        font-family: "Outfit", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.03em;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow-lg);
      }
      .uix-toast-success { background: #052e16; border: 1px solid #166534; color: #86efac; }
      .uix-toast-error   { background: #2d0a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
      @keyframes shake {
        0%, 100% { transform: translateX(-50%); }
        25%       { transform: translateX(-53%); }
        75%       { transform: translateX(-47%); }
      }
      .toast-error { animation: shake 0.2s ease-in-out 0s 2; }

      /* ─── Loading spinner ────────────────────────────────────────── */
      .uix-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(59,91,219,0.2);
        border-top-color: var(--brand);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ─── Markdown Content ───────────────────────────────────────── */
      .markdown-content { font-family: "DM Sans", sans-serif; font-size: 13px; line-height: 1.65; }
      .markdown-content h1,
      .markdown-content h2,
      .markdown-content h3 {
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        margin-top: 1rem;
      }
      .markdown-content h1 { font-size: 1rem; }
      .markdown-content h2 { font-size: 0.9rem; }
      .markdown-content h3 { font-size: 0.85rem; }
      .markdown-content p { margin-bottom: 0.6rem; }
      .markdown-content p:last-child { margin-bottom: 0; }
      .markdown-content ul,
      .markdown-content ol { margin-bottom: 0.6rem; padding-left: 1.25rem; }
      .markdown-content li { margin-bottom: 0.2rem; }
      .markdown-content ul { list-style-type: disc; }
      .markdown-content ol { list-style-type: decimal; }
      .markdown-content code {
        font-family: "JetBrains Mono", monospace;
        background: rgba(59,91,219,0.15);
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
        font-size: 0.82em;
        color: #a5b4fc;
      }
      .uix-bubble-user .markdown-content code { background: rgba(255,255,255,0.2); color: #fff; }
      .light .markdown-content code { background: rgba(59,91,219,0.08); color: var(--brand); }
      .markdown-content pre {
        background: #0c0f1a;
        color: #e2e8f0;
        padding: 1rem;
        border-radius: var(--r-sm);
        margin-bottom: 0.75rem;
        overflow-x: auto;
        border: 1px solid rgba(255,255,255,0.06);
      }
      .markdown-content pre code { background: transparent; padding: 0; color: inherit; }
      .markdown-content strong { font-weight: 600; }

      /* ─── Starter prompt chips ───────────────────────────────────── */
      .uix-starter-chip {
        text-align: left;
        padding: 10px 14px;
        border-radius: var(--r-sm);
        border: 1px solid var(--card-border);
        background: transparent;
        color: var(--text-secondary);
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, color 0.15s;
        width: 100%;
      }
      .uix-starter-chip:hover {
        border-color: var(--brand);
        background: var(--brand-dim);
        color: var(--text-primary);
      }

      /* ─── New screen / add panel ─────────────────────────────────── */
      .uix-add-panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--r-xl);
        box-shadow: var(--shadow-lg);
      }
      .light .uix-add-panel { background: #fff; border-color: rgba(0,0,0,0.08); }

      /* ─── Misc main-logo remnant removal ─────────────────────────── */
      .main-logo { display: none; }
    </style>

    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
          "react-dom/": "https://esm.sh/react-dom@18.3.1/",
          "react/": "https://esm.sh/react@18.3.1/",
          "react": "https://esm.sh/react@18.3.1",
          "reactflow": "https://esm.sh/reactflow@11.10.1?deps=react@18.3.1,react-dom@18.3.1",
          "jszip": "https://esm.sh/jszip@3.10.1",
          "marked": "https://esm.sh/marked@12.0.0"
        }
      }
    </script>
  </head>
  <body class="overflow-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
