<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIX AI Agent | Brutalist Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans:    ["Inter", "sans-serif"],
              display: ["Bricolage Grotesque", "sans-serif"],
              mono:    ["JetBrains Mono", "monospace"],
            },
            colors: {
              lime: "#d4ff00",
              graphite: "#0a0a0a",
              surface: "#111111",
              border: "#222222",
              muted: "#666666",
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reactflow@11.10.1/dist/style.css"
    />

    <style>
      
      :root {
        
        --bg: #000000;
        --surface: #111111;
        --border: #222222;
        --fg: #ffffff;
        --muted: #666666;
        --lime: #d4ff00; 

        --text-micro: 10px;
        --text-body: 13px;
        --text-display: 40px;

        --shadow-hard: 4px 4px 0 rgba(255, 255, 255, 0.1);
        --shadow-lime: 4px 4px 0 var(--lime);

        --radius: 0px;

        --fast: 100ms linear;
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: "Inter", sans-serif;
        font-size: var(--text-body);
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        
        background-image: linear-gradient(var(--border) 1px, transparent 1px),
                          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: -1px -1px;
      }

      .brutal-display {
        font-family: "Bricolage Grotesque", sans-serif;
        font-size: var(--text-display);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 0.95;
        text-transform: uppercase;
      }

      .brutal-micro {
        font-family: "JetBrains Mono", monospace;
        font-size: var(--text-micro);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .brutal-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-hard);
        border-radius: var(--radius);
      }

      .brutal-btn {
        background: var(--fg);
        color: var(--bg);
        border: 1px solid var(--fg);
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 14px;
        text-transform: uppercase;
        padding: 8px 16px;
        cursor: pointer;
        box-shadow: 2px 2px 0 var(--border);
        transition: transform var(--fast), box-shadow var(--fast), background var(--fast);
      }
      .brutal-btn:hover {
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0 var(--lime);
        background: var(--lime);
        border-color: var(--lime);
        color: var(--bg);
      }
      .brutal-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 0 0 0 transparent;
      }
      .brutal-btn:disabled {
        opacity: 0.3;
        pointer-events: none;
        box-shadow: none;
      }

      .brutal-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid transparent;
        padding: 4px 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: var(--text-micro);
        cursor: pointer;
        transition: background var(--fast), color var(--fast);
      }
      .brutal-ghost:hover {
        background: var(--fg);
        color: var(--bg);
      }

      .brutal-input {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--fg);
        font-family: "Inter", sans-serif;
        font-size: var(--text-body);
        padding: 12px;
        outline: none;
        resize: none;
        transition: border-color var(--fast);
      }
      .brutal-input:focus {
        border-color: var(--lime);
      }

      .brutal-bubble-user {
        border: 1px solid var(--lime);
        background: rgba(212, 255, 0, 0.05); 
        color: var(--fg);
        padding: 12px;
      }
      .brutal-bubble-ai {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--fg);
        padding: 12px;
        box-shadow: 2px 2px 0 var(--border);
      }

      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg); border-left: 1px solid var(--border); }
      ::-webkit-scrollbar-thumb { background: var(--muted); }
      ::-webkit-scrollbar-thumb:hover { background: var(--fg); }
      .chat-scroll::-webkit-scrollbar { width: 0; }

      .react-flow__pane          { cursor: crosshair !important; }
      .react-flow__pane.dragging { cursor: grabbing !important; }
      .react-flow__handle        { display: none !important; }
      .react-flow__node          { border-radius: 0 !important; }
      .react-flow__node.selected { border: none !important; }
      .react-flow__attribution   { display: none !important; }

      .screen-frame-mobile, .screen-frame-tablet, .screen-frame-desktop {
        border: 1px solid var(--border);
        box-shadow: var(--shadow-hard);
        background: var(--bg);
      }
      .brutal-node-selected {
        border-color: var(--lime);
        box-shadow: var(--shadow-lime);
      }

      .modal-backdrop {
        background: rgba(0,0,0,0.85);
        backdrop-filter: grayscale(100%);
      }

      .markdown-content { font-family: "Inter", sans-serif; font-size: 13px; line-height: 1.5; }
      .markdown-content h1, .markdown-content h2, .markdown-content h3 {
        font-family: "Bricolage Grotesque", sans-serif;
        text-transform: uppercase;
        margin-top: 1rem; margin-bottom: 0.5rem;
      }
      .markdown-content p { margin-bottom: 0.5rem; }
      .markdown-content code {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 2px 4px;
        font-size: var(--text-micro);
        color: var(--fg);
      }
      .markdown-content pre {
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 12px;
        margin-bottom: 1rem;
        overflow-x: auto;
      }
      .markdown-content pre code { border: none; padding: 0; }
    </style>

    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
          "react-dom/": "https://esm.sh/react-dom@18.3.1/",
          "react/": "https://esm.sh/react@18.3.1/",
          "react": "https://esm.sh/react@18.3.1",
          "reactflow": "https://esm.sh/reactflow@11.10.1?deps=react@18.3.1,react-dom@18.3.1",
          "jszip": "https://esm.sh/jszip@3.10.1",
          "marked": "https://esm.sh/marked@12.0.0"
        }
      }
    </script>
  </head>
  <body class="overflow-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
